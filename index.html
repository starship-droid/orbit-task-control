<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — Task Control</title>
<meta name="description" content="ORBIT: Personal Task Control. A sleek sci-fi task management app with keyboard shortcuts and real-time visual feedback.">
<meta property="og:title" content="ORBIT — Task Control">
<meta property="og:description" content="Personal Task Control — Alpha Station. Manage your missions with sci-fi style.">
<meta property="og:image" content="https://orbit-control.netlify.app/orbit-preview-100.png">
<meta property="og:type" content="website">
<meta name="twitter:image" content="https://orbit-control.netlify.app/orbit-preview-100.png">
<link rel="icon" type="image/svg+xml" href="orbit-control.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void: #02020f;
  --deep: #060616;
  --glass-bg: rgba(8,12,35,0.55);
  --glass-border: rgba(77,201,255,0.18);
  --glow-blue: #4dc9ff;
  --glow-purple: #b060ff;
  --glow-teal: #00ffcc;
  --glow-pink: #ff5cf7;
  --glow-orange: #ff9d3d;
  --text-primary: rgba(255,255,255,0.95);
  --text-dim: rgba(180,210,255,0.5);
  --text-ghost: rgba(120,160,220,0.3);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--void);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  user-select: none;
}

#cosmos {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, #1a0533 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, #050d2e 0%, transparent 60%),
    var(--void);
}

#starfield { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

.nebula-cloud {
  position: fixed; border-radius: 50%; filter: blur(60px); pointer-events: none;
  animation: nebula-drift 20s ease-in-out infinite alternate;
}
@keyframes nebula-drift {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(30px,-20px) scale(1.05); }
}

#scanlines {
  position: fixed; inset: 0; z-index: 2;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
}

/* ── LAYOUT ── */
#app {
  position: relative; z-index: 10;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 24px 16px;
}

/* ── HEADER ── */
#header {
  width: 100%; max-width: 760px;
  margin-bottom: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}

#logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  letter-spacing: 0.35em;
  background: linear-gradient(135deg, #ffffff 0%, #b0d4ff 35%, #d4b0ff 65%, #b0ffe8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 30px rgba(77,201,255,0.5));
  animation: logo-pulse 4s ease-in-out infinite;
}
@keyframes logo-pulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(77,201,255,0.4)); }
  50% { filter: drop-shadow(0 0 45px rgba(176,96,255,0.6)); }
}

#tagline {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.4em; color: var(--text-dim); text-transform: uppercase;
}

/* ── INPUT PANEL ── */
.glass-panel {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--glass-border);
  clip-path: polygon(16px 0%,calc(100% - 16px) 0%,100% 16px,100% calc(100% - 16px),calc(100% - 16px) 100%,16px 100%,0% calc(100% - 16px),0% 16px);
  box-shadow: 0 0 0 1px rgba(77,201,255,0.05) inset, 0 8px 40px rgba(0,0,0,0.55);
  overflow: hidden;
}
.glass-panel::before {
  content: ''; position: absolute; top:0; left:14%; right:14%; height:1px;
  background: linear-gradient(90deg,transparent,var(--glow-blue) 40%,var(--glow-purple) 60%,transparent);
  opacity: 0.45; z-index: 2; pointer-events: none;
}
.corner { position: absolute; width: 13px; height: 13px; border-color: var(--glow-blue); border-style: solid; opacity: 0.65; z-index: 4; pointer-events: none; }
.corner.tl { top:4px; left:4px; border-width:1.5px 0 0 1.5px; }
.corner.tr { top:4px; right:4px; border-width:1.5px 1.5px 0 0; }
.corner.bl { bottom:4px; left:4px; border-width:0 0 1.5px 1.5px; }
.corner.br { bottom:4px; right:4px; border-width:0 1.5px 1.5px 0; }

#input-panel {
  width: 100%; max-width: 640px;
  margin-bottom: 12px;
  padding: 16px 22px;
}
#input-row { display: flex; align-items: center; gap: 14px; }
#task-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 500;
  color: var(--text-primary); letter-spacing: 0.02em; caret-color: var(--glow-teal);
}
#task-input::placeholder { color: var(--text-ghost); font-style: italic; font-weight: 300; }
#input-hint {
  font-family: 'Space Mono', monospace; font-size: 0.52rem; color: var(--text-ghost);
  white-space: nowrap; padding: 3px 10px;
  border: 1px solid rgba(77,201,255,0.12); background: rgba(77,201,255,0.04);
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%); letter-spacing: 0.07em;
}

/* ── SATURN STAGE ── */
#saturn-stage {
  flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
  position: relative; min-height: 0;
}

/* ── SATURN SVG CANVAS ── */
#saturn-canvas {
  width: 100%; height: 100%;
  max-width: 700px; max-height: 500px;
}

/* ── TASK LABEL OVERLAY ── */
#task-label-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 20;
}

#selected-task-box {
  position: relative;
  background: rgba(8,6,30,0.82);
  border: 1px solid rgba(176,96,255,0.55);
  clip-path: polygon(12px 0%,calc(100% - 12px) 0%,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0% calc(100% - 12px),0% 12px);
  padding: 10px 22px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 28px rgba(176,96,255,0.25), 0 0 0 1px rgba(176,96,255,0.1) inset;
  min-width: 180px; max-width: 320px;
  text-align: center;
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.35s cubic-bezier(0.23,1,0.32,1), transform 0.35s cubic-bezier(0.23,1,0.32,1);
  pointer-events: auto;
}
#selected-task-box.visible {
  opacity: 1; transform: scale(1);
}
#selected-task-box::before {
  content: ''; position: absolute; top: 0; left: 14%; right: 14%; height: 1px;
  background: linear-gradient(90deg,transparent,var(--glow-purple) 40%,var(--glow-blue) 60%,transparent);
  opacity: 0.7;
}

#task-box-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem; letter-spacing: 0.3em; color: var(--text-ghost);
  text-transform: uppercase; margin-bottom: 4px;
}

#task-box-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem; font-weight: 600; color: var(--text-primary);
  letter-spacing: 0.04em; line-height: 1.3;
  word-break: break-word;
}

#task-box-meta {
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem; color: var(--text-ghost); letter-spacing: 0.15em; margin-top: 4px;
}

/* ── EDIT INPUT INSIDE TASK BOX ── */
#task-box-edit {
  background: transparent; border: none; outline: none;
  border-bottom: 1px solid var(--glow-purple);
  font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 600;
  color: var(--text-primary); text-align: center; width: 100%;
  caret-color: var(--glow-purple); display: none;
}

/* ── EMPTY STATE ── */
#empty-hint {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  color: var(--text-ghost); letter-spacing: 0.15em; text-align: center;
  pointer-events: none; transition: opacity 0.3s ease;
}

/* ── SHORTCUTS ── */
#shortcuts-panel {
  width: 100%; max-width: 640px;
  padding: 11px 22px;
  display: flex; flex-wrap: wrap; gap: 6px 20px; justify-content: center;
}
.shortcut { display: flex; align-items: center; gap: 7px; font-size: 0.68rem; color: var(--text-dim); font-family: 'Space Mono', monospace; }
.key {
  background: rgba(77,201,255,0.06); border: 1px solid rgba(77,201,255,0.2);
  border-bottom: 2px solid rgba(77,201,255,0.1); padding: 2px 6px;
  font-size: 0.5rem; color: rgba(180,220,255,0.8); letter-spacing: 0.05em;
  font-family: 'Orbitron', monospace; white-space: nowrap;
  clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}

/* ── MODE INDICATOR ── */
#mode-indicator {
  position: fixed; top: 18px; right: 22px;
  font-family: 'Orbitron', monospace; font-size: 0.52rem; letter-spacing: 0.2em;
  padding: 5px 12px; border-radius: 20px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim); z-index: 50; transition: all 0.3s ease;
}
#mode-indicator.adding { color: var(--glow-purple); border-color: rgba(176,96,255,0.4); background: rgba(176,96,255,0.06); box-shadow: 0 0 15px rgba(176,96,255,0.2); }
#mode-indicator.ring { color: var(--glow-blue); border-color: rgba(77,201,255,0.4); background: rgba(77,201,255,0.06); box-shadow: 0 0 15px rgba(77,201,255,0.2); }
#mode-indicator.editing { color: var(--glow-teal); border-color: rgba(0,255,204,0.4); background: rgba(0,255,204,0.06); box-shadow: 0 0 15px rgba(0,255,204,0.2); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 9px 20px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 30px;
  backdrop-filter: blur(20px); font-family: 'Space Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.1em; color: var(--text-dim);
  opacity: 0; transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
  z-index: 200; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PARTICLES ── */
.particle {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 100;
  animation: particle-burst 0.85s cubic-bezier(0.23,1,0.32,1) forwards;
}
@keyframes particle-burst {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0); }
}

.orbit-ring-fx {
  position: fixed; border-radius: 50%; border: 1.5px solid var(--glow-teal);
  pointer-events: none; z-index: 100; opacity: 0;
  animation: orbit-expand 0.6s ease-out forwards;
}
@keyframes orbit-expand {
  0% { opacity: 0.8; transform: translate(-50%,-50%) scale(0.2); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(3); }
}

.warp-line {
  position: fixed; width: 1px; height: 40vh; top: 50%;
  background: linear-gradient(to bottom, transparent, var(--glow-purple), transparent);
  pointer-events: none; z-index: 99; transform-origin: center;
  animation: warp-line 0.4s ease-out forwards;
}
@keyframes warp-line {
  0% { transform: scaleY(0) translateX(var(--x)); opacity: 0.8; }
  50% { transform: scaleY(1) translateX(var(--x)); opacity: 0.5; }
  100% { transform: scaleY(0) translateX(var(--x)); opacity: 0; }
}

/* Task entering ring animation */
@keyframes task-spawn-to-ring {
  0% { r: 0; opacity: 0; }
  40% { r: 14; opacity: 1; }
  70% { r: 10; opacity: 1; }
  100% { r: 8; opacity: 1; }
}

</style>
</head>
<body>

<div id="cosmos"></div>
<canvas id="starfield"></canvas>
<div id="scanlines"></div>
<div id="mode-indicator">ORBIT CONTROL</div>
<div id="toast"></div>

<div id="app">
  <div id="header">
    <div id="logo">ORBIT</div>
    <div id="tagline">// Personal Task Control — Alpha Station</div>
  </div>

  <!-- Input -->
  <div class="glass-panel" id="input-panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="input-row">
      <span style="color:var(--glow-purple);font-size:1rem;opacity:0.7;flex-shrink:0">+</span>
      <input id="task-input" type="text" placeholder="New mission directive…" autocomplete="off" spellcheck="false">
      <div id="input-hint">ENTER · TAB to orbit</div>
    </div>
  </div>

  <!-- Saturn Stage -->
  <div id="saturn-stage">
    <svg id="saturn-canvas" viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Saturn body gradient - purple/blue -->
        <radialGradient id="saturnGrad" cx="42%" cy="38%" r="60%">
          <stop offset="0%" stop-color="#c8a0ff" stop-opacity="0.9"/>
          <stop offset="25%" stop-color="#9060e0" stop-opacity="0.85"/>
          <stop offset="55%" stop-color="#4030a0" stop-opacity="0.8"/>
          <stop offset="80%" stop-color="#201060" stop-opacity="0.75"/>
          <stop offset="100%" stop-color="#100830" stop-opacity="0.7"/>
        </radialGradient>
        <!-- Saturn atmosphere bands -->
        <linearGradient id="bandGrad1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b080ff" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
        <!-- Ring gradient for depth -->
        <linearGradient id="ringFade" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(150,140,180,0.9)"/>
          <stop offset="50%" stop-color="rgba(200,190,220,0.6)"/>
          <stop offset="100%" stop-color="rgba(150,140,180,0.9)"/>
        </linearGradient>
        <!-- Glow filter for tasks on ring -->
        <filter id="taskGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Softer glow for selected task -->
        <filter id="selectedGlow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Saturn shadow/rim -->
        <radialGradient id="saturnRim" cx="50%" cy="50%" r="50%">
          <stop offset="70%" stop-color="transparent"/>
          <stop offset="90%" stop-color="rgba(80,40,160,0.4)"/>
          <stop offset="100%" stop-color="rgba(40,20,100,0.8)"/>
        </radialGradient>
        <!-- Clip for ring behind planet -->
        <clipPath id="ringBehindClip">
          <rect x="0" y="0" width="700" height="235"/>
        </clipPath>
        <!-- Clip for ring in front of planet -->
        <clipPath id="ringFrontClip">
          <rect x="0" y="235" width="700" height="225"/>
        </clipPath>
        <!-- Saturn body clip -->
        <clipPath id="saturnBodyClip">
          <ellipse cx="350" cy="230" rx="115" ry="108"/>
        </clipPath>
        <!-- Clip tasks behind planet -->
        <clipPath id="taskBehindClip">
          <rect x="0" y="0" width="700" height="232"/>
        </clipPath>
        <clipPath id="taskFrontClip">
          <rect x="0" y="232" width="700" height="228"/>
        </clipPath>
      </defs>

      <!-- RING BEHIND PLANET -->
      <g id="ring-behind" clip-path="url(#ringBehindClip)">
        <!-- drawn dynamically by JS -->
      </g>

      <!-- TASKS BEHIND PLANET -->
      <g id="tasks-behind" clip-path="url(#taskBehindClip)">
      </g>

      <!-- SATURN BODY -->
      <ellipse id="saturn-body" cx="350" cy="230" rx="115" ry="108" fill="url(#saturnGrad)"/>
      <!-- Atmosphere bands -->
      <ellipse cx="350" cy="210" rx="108" ry="20" fill="rgba(160,100,255,0.07)" clip-path="url(#saturnBodyClip)"/>
      <ellipse cx="350" cy="230" rx="112" ry="16" fill="rgba(80,60,200,0.08)" clip-path="url(#saturnBodyClip)"/>
      <ellipse cx="350" cy="250" rx="108" ry="14" fill="rgba(120,80,255,0.06)" clip-path="url(#saturnBodyClip)"/>
      <!-- Rim light -->
      <ellipse cx="350" cy="230" rx="115" ry="108" fill="url(#saturnRim)"/>
      <!-- Specular highlight -->
      <ellipse cx="325" cy="205" rx="28" ry="20" fill="rgba(220,200,255,0.12)"/>
      <ellipse cx="316" cy="198" rx="12" ry="8" fill="rgba(255,255,255,0.08)"/>

      <!-- RING IN FRONT OF PLANET -->
      <g id="ring-front" clip-path="url(#ringFrontClip)">
        <!-- drawn dynamically by JS -->
      </g>

      <!-- TASKS IN FRONT OF PLANET -->
      <g id="tasks-front" clip-path="url(#taskFrontClip)">
      </g>

      <!-- Empty state text inside saturn area -->
      <g id="empty-svg-state">
        <text x="350" y="222" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="rgba(120,100,180,0.5)" letter-spacing="2">NO MISSIONS</text>
        <text x="350" y="240" text-anchor="middle" font-family="Space Mono, monospace" font-size="9" fill="rgba(100,80,160,0.4)" letter-spacing="1">TYPE ABOVE · ENTER</text>
      </g>
    </svg>

    <!-- Task label overlay (shows selected task name) -->
    <div id="task-label-overlay">
      <div id="selected-task-box">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div id="task-box-label">ACTIVE MISSION</div>
        <div id="task-box-text"></div>
        <input id="task-box-edit" type="text" autocomplete="off" spellcheck="false"/>
        <div id="task-box-meta"></div>
      </div>
    </div>
  </div>

  <!-- Shortcuts -->
  <div class="glass-panel" id="shortcuts-panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="shortcut"><span class="key">TAB</span> Switch focus</div>
    <div class="shortcut"><span class="key">↑ ↓</span> Rotate ring</div>
    <div class="shortcut"><span class="key">Space</span> Complete</div>
    <div class="shortcut"><span class="key">E</span> Edit</div>
    <div class="shortcut"><span class="key">Del</span> Delete</div>
    <div class="shortcut"><span class="key">N</span> New mission</div>
  </div>
</div>

<script>
// ─── STARS ───────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length: 200}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.3 + 0.2,
    op: Math.random() * 0.7 + 0.1,
    speed: Math.random() * 0.012 + 0.004,
    phase: Math.random() * Math.PI * 2
  }));

  const shoots = [];
  function maybeShoot() {
    if (Math.random() < 0.3) shoots.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height * 0.5,
      vx: (Math.random() * 4 + 3) * (Math.random() < 0.5 ? 1 : -1),
      vy: Math.random() * 2 + 1, len: Math.random() * 80 + 40, op: 0.9
    });
    setTimeout(maybeShoot, Math.random() * 4000 + 2000);
  }
  maybeShoot();

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); t += 0.016;
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.op * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase))})`;
      ctx.fill();
    });
    shoots.forEach((s, i) => {
      s.x += s.vx; s.y += s.vy; s.op -= 0.025;
      ctx.beginPath(); ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.vx * 10, s.y - s.vy * 10);
      const g = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * 10, s.y - s.vy * 10);
      g.addColorStop(0, `rgba(180,210,255,${s.op})`); g.addColorStop(1, 'transparent');
      ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
      if (s.op <= 0) shoots.splice(i, 1);
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── NEBULAS ────────────────────────────────────────────────────────────────
(function() {
  [
    { color: 'rgba(80,0,180,0.18)', size: 500, top: '10%', left: '5%', delay: '0s' },
    { color: 'rgba(0,60,180,0.14)', size: 400, top: '60%', left: '70%', delay: '5s' },
    { color: 'rgba(140,0,180,0.1)', size: 600, top: '40%', left: '40%', delay: '10s' },
  ].forEach(c => {
    const el = document.createElement('div');
    el.className = 'nebula-cloud';
    el.style.cssText = `background:radial-gradient(circle,${c.color},transparent 70%);width:${c.size}px;height:${c.size}px;top:${c.top};left:${c.left};animation-delay:${c.delay};`;
    document.getElementById('cosmos').appendChild(el);
  });
})();

// ─── STATE ───────────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('orbit-tasks') || '[]');
let selectedIdx = -1;
let mode = 'normal'; // normal | adding | ring | editing

function save() { localStorage.setItem('orbit-tasks', JSON.stringify(tasks)); }

// Task colors (galaxy palette)
const TASK_COLORS = [
  { fill: '#b060ff', glow: 'rgba(176,96,255,0.8)' },   // purple
  { fill: '#4dc9ff', glow: 'rgba(77,201,255,0.8)' },   // blue
  { fill: '#00ffcc', glow: 'rgba(0,255,204,0.8)' },    // teal
  { fill: '#ff9d3d', glow: 'rgba(255,157,61,0.8)' },   // orange
  { fill: '#ff5cf7', glow: 'rgba(255,92,247,0.8)' },   // pink
  { fill: '#7df9ff', glow: 'rgba(125,249,255,0.8)' },  // electric cyan
];

// ─── SATURN RING ENGINE ──────────────────────────────────────────────────────
const CX = 350, CY = 230;
const RING_RX = 210, RING_RY = 52;   // ring ellipse radii
const RING_TILT = -0.18;              // radians — slight tilt off x axis

// Ring particle configuration
const RING_PARTICLES = 80;
let ringRotation = 0;                 // current rotation angle offset
let targetRingRotation = 0;          // target (for smooth snapping)
let ringAnimating = false;
let newTaskAnimating = null;          // {angle, progress, color} for spawn anim

// Convert ellipse angle to screen XY (with tilt)
function ellipsePoint(angle) {
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  const x = CX + RING_RX * cosA;
  const yBase = CY + RING_RY * sinA;
  // Apply a small tilt: rotate the point slightly around planet center
  const dx = x - CX, dy = yBase - CY;
  const tx = dx * Math.cos(RING_TILT) - dy * Math.sin(RING_TILT);
  const ty = dx * Math.sin(RING_TILT) + dy * Math.cos(RING_TILT);
  return { x: CX + tx, y: CY + ty };
}

// Is a point "behind" the planet (top half of ellipse = behind)
function isBehind(angle) {
  const normAngle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  return normAngle > Math.PI; // top arc = behind
}

function drawRing(ringRotation) {
  const behind = document.getElementById('ring-behind');
  const front = document.getElementById('ring-front');
  behind.innerHTML = '';
  front.innerHTML = '';

  // Draw concentric ring ellipses (3 rings with varying opacity)
  const rings = [
    { scale: 1.0, opacity: 0.55, strokeW: 1.2 },
    { scale: 0.88, opacity: 0.35, strokeW: 0.8 },
    { scale: 1.12, opacity: 0.25, strokeW: 0.6 },
  ];

  rings.forEach(r => {
    const rx = RING_RX * r.scale;
    const ry = RING_RY * r.scale;
    // Build path for tilted ellipse
    const pts = [];
    for (let a = 0; a <= Math.PI * 2; a += 0.05) {
      const cosA = Math.cos(a), sinA = Math.sin(a);
      let px = CX + rx * cosA;
      let py = CY + ry * sinA;
      const dx = px - CX, dy = py - CY;
      const tx = dx * Math.cos(RING_TILT) - dy * Math.sin(RING_TILT);
      const ty = dx * Math.sin(RING_TILT) + dy * Math.cos(RING_TILT);
      pts.push([CX + tx, CY + ty]);
    }
    const pathData = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ') + 'Z';

    // Behind half
    const eb = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    eb.setAttribute('d', pathData);
    eb.setAttribute('fill', 'none');
    eb.setAttribute('stroke', `rgba(160,150,200,${r.opacity * 0.6})`);
    eb.setAttribute('stroke-width', r.strokeW);
    behind.appendChild(eb);

    // Front half
    const ef = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    ef.setAttribute('d', pathData);
    ef.setAttribute('fill', 'none');
    ef.setAttribute('stroke', `rgba(200,190,230,${r.opacity})`);
    ef.setAttribute('stroke-width', r.strokeW);
    front.appendChild(ef);
  });

  // Draw ring dust particles
  for (let i = 0; i < RING_PARTICLES; i++) {
    const angle = (i / RING_PARTICLES) * Math.PI * 2 + ringRotation;
    // Vary radial position slightly for depth
    const radialVariance = (Math.sin(i * 7.3) * 0.18 + Math.cos(i * 3.1) * 0.08);
    const scaleX = 1 + radialVariance;
    const scaleY = 1 + radialVariance * 0.4;

    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    let px = CX + RING_RX * scaleX * cosA;
    let py = CY + RING_RY * scaleY * sinA;
    const dx = px - CX, dy = py - CY;
    const tx = dx * Math.cos(RING_TILT) - dy * Math.sin(RING_TILT);
    const ty = dx * Math.sin(RING_TILT) + dy * Math.cos(RING_TILT);
    const fx = CX + tx, fy = CY + ty;

    // Vary size
    const baseSize = i % 5 === 0 ? 2.8 : i % 3 === 0 ? 1.8 : 1.0;
    const col = i % 5 === 0 ? 'rgba(200,190,220,0.7)' : i % 3 === 0 ? 'rgba(170,160,200,0.5)' : 'rgba(140,130,170,0.35)';

    const behind_half = isBehind(angle);
    const parent = behind_half ? behind : front;
    const opacity = behind_half ? 0.45 : 1.0;

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', fx);
    circle.setAttribute('cy', fy);
    circle.setAttribute('r', baseSize);
    circle.setAttribute('fill', col);
    circle.setAttribute('opacity', opacity);
    parent.appendChild(circle);
  }
}

// Get the angle on the ring for task index i (tasks are evenly spaced)
function taskAngle(idx) {
  if (tasks.length === 0) return 0;
  return (idx / tasks.length) * Math.PI * 2 + ringRotation;
}

// Angle for selected task to appear at "front-bottom" = angle PI/2 (6 o'clock position)
const SELECTED_ANGLE = Math.PI / 2;  // bottom of ellipse

function getRotationForSelected(idx) {
  if (tasks.length === 0) return 0;
  // We want task idx to be at SELECTED_ANGLE
  const naturalAngle = (idx / tasks.length) * Math.PI * 2;
  return SELECTED_ANGLE - naturalAngle;
}

function drawTasks(ringRot) {
  const behind = document.getElementById('tasks-behind');
  const front = document.getElementById('tasks-front');
  behind.innerHTML = '';
  front.innerHTML = '';

  tasks.forEach((task, i) => {
    const angle = (i / tasks.length) * Math.PI * 2 + ringRot;
    const pt = ellipsePoint(angle);
    const behind_half = isBehind(angle);
    const parent = behind_half ? behind : front;
    const colorObj = TASK_COLORS[i % TASK_COLORS.length];
    const isSelected = (i === selectedIdx) && mode === 'ring';
    const opacity = behind_half ? 0.5 : 1.0;
    const r = isSelected ? 11 : (task.done ? 6 : 8);

    // Glow circle
    if (!behind_half) {
      const glowC = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      glowC.setAttribute('cx', pt.x);
      glowC.setAttribute('cy', pt.y);
      glowC.setAttribute('r', r + 6);
      glowC.setAttribute('fill', colorObj.glow.replace('0.8', '0.18'));
      glowC.setAttribute('filter', 'url(#taskGlow)');
      parent.appendChild(glowC);
    }

    // Main task circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pt.x);
    circle.setAttribute('cy', pt.y);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', task.done ? 'rgba(0,255,204,0.3)' : colorObj.fill);
    circle.setAttribute('opacity', opacity);
    if (isSelected) {
      circle.setAttribute('filter', 'url(#selectedGlow)');
      circle.setAttribute('stroke', 'rgba(255,255,255,0.6)');
      circle.setAttribute('stroke-width', '1.5');
    }
    if (task.done) {
      circle.setAttribute('stroke', '#00ffcc');
      circle.setAttribute('stroke-width', '1.5');
    }
    parent.appendChild(circle);

    // Done checkmark
    if (task.done && !behind_half) {
      const ck = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      ck.setAttribute('x', pt.x);
      ck.setAttribute('y', pt.y + 3);
      ck.setAttribute('text-anchor', 'middle');
      ck.setAttribute('font-size', '8');
      ck.setAttribute('fill', '#00ffcc');
      ck.setAttribute('opacity', opacity);
      ck.textContent = '✓';
      parent.appendChild(ck);
    }
  });

  // New task spawn animation
  if (newTaskAnimating) {
    const { angle, progress, color } = newTaskAnimating;
    const pt = ellipsePoint(angle);
    const behind_half = isBehind(angle);
    const parent = behind_half ? behind : front;
    const r = progress < 0.4 ? progress / 0.4 * 14 : progress < 0.7 ? 14 - (progress - 0.4) / 0.3 * 6 : 8;
    const gAlpha = Math.min(1, progress * 3);

    const spawnCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    spawnCircle.setAttribute('cx', pt.x);
    spawnCircle.setAttribute('cy', pt.y);
    spawnCircle.setAttribute('r', r);
    spawnCircle.setAttribute('fill', color.fill);
    spawnCircle.setAttribute('opacity', gAlpha * (behind_half ? 0.5 : 1.0));
    parent.appendChild(spawnCircle);
  }
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
let lastTime = 0;
const BASE_ROTATION_SPEED = 0.0004; // radians per ms — slow idle drift

function animLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Idle ring rotation (always drifts)
  ringRotation += BASE_ROTATION_SPEED * dt;

  // Smooth snap to target when in ring mode and we have a selection
  if (mode === 'ring' && tasks.length > 0) {
    const target = getRotationForSelected(selectedIdx);
    // Normalize difference
    let diff = target - (ringRotation % (Math.PI * 2));
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;

    // Spring towards target (faster snap)
    ringRotation += diff * 0.08;
  }

  // New task spawn animation
  if (newTaskAnimating) {
    newTaskAnimating.progress += dt / 700;
    if (newTaskAnimating.progress >= 1) newTaskAnimating = null;
  }

  // Update empty state visibility
  const emptyState = document.getElementById('empty-svg-state');
  if (emptyState) emptyState.style.display = tasks.length === 0 ? 'block' : 'none';

  drawRing(ringRotation);
  drawTasks(ringRotation);
  updateTaskBox();

  requestAnimationFrame(animLoop);
}
requestAnimationFrame(animLoop);

// ─── TASK BOX (OVERLAY) ──────────────────────────────────────────────────────
function updateTaskBox() {
  const box = document.getElementById('selected-task-box');
  const textEl = document.getElementById('task-box-text');
  const metaEl = document.getElementById('task-box-meta');
  const editEl = document.getElementById('task-box-edit');
  const labelEl = document.getElementById('task-box-label');

  if (mode === 'ring' && selectedIdx >= 0 && selectedIdx < tasks.length) {
    const task = tasks[selectedIdx];
    box.classList.add('visible');

    if (mode === 'ring' && task.editing) {
      textEl.style.display = 'none';
      editEl.style.display = 'block';
      labelEl.textContent = 'EDIT MISSION';
    } else {
      textEl.style.display = 'block';
      editEl.style.display = 'none';
      textEl.textContent = task.text;
      const done = tasks.filter(t => t.done).length;
      metaEl.textContent = `MISSION ${selectedIdx + 1} / ${tasks.length} · ${done} COMPLETE`;
      labelEl.textContent = task.done ? 'MISSION COMPLETE' : 'ACTIVE MISSION';

      // Color the border based on task color
      const col = TASK_COLORS[selectedIdx % TASK_COLORS.length];
      box.style.borderColor = col.fill + '99';
      box.style.boxShadow = `0 0 28px ${col.glow.replace('0.8', '0.2')}, 0 0 0 1px ${col.fill}22 inset`;
    }
    if (task.done) {
      textEl.style.textDecoration = 'line-through';
      textEl.style.color = 'rgba(0,255,204,0.7)';
    } else {
      textEl.style.textDecoration = 'none';
      textEl.style.color = '';
    }
  } else {
    box.classList.remove('visible');
  }
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1900);
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function burst(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const dist = 30 + Math.random() * 55;
    const size = 2 + Math.random() * 4;
    p.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};box-shadow:0 0 ${size*2}px ${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
  const ring = document.createElement('div');
  ring.className = 'orbit-ring-fx';
  ring.style.cssText = `left:${x}px;top:${y}px;width:30px;height:30px;border-color:${color};`;
  document.body.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());
}

function warpEffect() {
  for (let i = 0; i < 8; i++) {
    const line = document.createElement('div');
    line.className = 'warp-line';
    const xPos = 10 + Math.random() * 80;
    line.style.cssText = `left:${xPos}vw;--x:${(Math.random()-0.5)*20}px;animation-delay:${Math.random()*0.2}s;`;
    document.body.appendChild(line);
    line.addEventListener('animationend', () => line.remove());
  }
}

// ─── MODE MANAGEMENT ─────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  const ind = document.getElementById('mode-indicator');
  ind.className = '';
  const labels = {
    normal: 'ORBIT CONTROL',
    adding: 'ADDING MISSION',
    ring: 'RING NAVIGATION',
    editing: 'EDITING MISSION'
  };
  if (m !== 'normal') ind.className = m;
  ind.textContent = labels[m] || 'ORBIT CONTROL';
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function addTask(text) {
  if (!text.trim()) return;
  const colorObj = TASK_COLORS[tasks.length % TASK_COLORS.length];
  tasks.push({ text: text.trim(), done: false, id: Date.now() });

  // Animate: new task spawns into ring position
  const newIdx = tasks.length - 1;
  const spawnAngle = (newIdx / tasks.length) * Math.PI * 2 + ringRotation;
  newTaskAnimating = { angle: spawnAngle, progress: 0, color: colorObj };

  warpEffect();
  burst(window.innerWidth / 2, window.innerHeight * 0.5, colorObj.fill, 14);
  showToast('Mission logged 🚀');
  save();
}

function completeTask(idx) {
  if (idx < 0 || idx >= tasks.length) return;
  tasks[idx].done = !tasks[idx].done;
  const col = TASK_COLORS[idx % TASK_COLORS.length];
  burst(window.innerWidth / 2, window.innerHeight * 0.5, tasks[idx].done ? '#00ffcc' : col.fill, 12);
  showToast(tasks[idx].done ? 'Mission complete 🛸' : 'Mission reopened ○');
  save();
}

function deleteTask(idx) {
  if (idx < 0 || idx >= tasks.length) return;
  burst(window.innerWidth / 2, window.innerHeight * 0.5, '#ff4d6d', 10);
  tasks.splice(idx, 1);
  if (selectedIdx >= tasks.length) selectedIdx = Math.max(0, tasks.length - 1);
  if (tasks.length === 0) { selectedIdx = -1; setMode('normal'); }
  showToast('Mission scrubbed ✕');
  save();
}

function startEditTask(idx) {
  if (idx < 0 || idx >= tasks.length || tasks[idx].done) return;
  tasks[idx].editing = true;
  setMode('editing');

  const editEl = document.getElementById('task-box-edit');
  const textEl = document.getElementById('task-box-text');
  editEl.value = tasks[idx].text;
  editEl.style.display = 'block';
  textEl.style.display = 'none';
  requestAnimationFrame(() => { editEl.focus(); editEl.selectionStart = editEl.value.length; });
}

function commitEdit(idx) {
  if (idx < 0 || idx >= tasks.length) return;
  const editEl = document.getElementById('task-box-edit');
  const newText = editEl.value.trim();
  if (newText) tasks[idx].text = newText;
  tasks[idx].editing = false;
  editEl.style.display = 'none';
  setMode('ring');
  showToast('Mission updated ✎');
  save();
}

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
const taskInput = document.getElementById('task-input');

taskInput.addEventListener('focus', () => setMode('adding'));
taskInput.addEventListener('blur', () => { if (mode === 'adding') setMode('normal'); });

taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = taskInput.value.trim();
    if (val) {
      addTask(val);
      taskInput.value = '';
      taskInput.blur();
      setMode('normal');
    }
  } else if (e.key === 'Escape') {
    taskInput.value = ''; taskInput.blur(); setMode('normal');
  } else if (e.key === 'Tab') {
    e.preventDefault();
    if (tasks.length > 0) {
      taskInput.blur();
      if (selectedIdx < 0) selectedIdx = 0;
      setMode('ring');
    }
  }
});

// Edit input in task box
const taskBoxEdit = document.getElementById('task-box-edit');
taskBoxEdit.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.stopPropagation(); commitEdit(selectedIdx); }
  else if (e.key === 'Escape') { e.stopPropagation(); tasks[selectedIdx].editing = false; setMode('ring'); }
});
taskBoxEdit.addEventListener('blur', () => {
  if (mode === 'editing' && selectedIdx >= 0 && tasks[selectedIdx]?.editing) commitEdit(selectedIdx);
});

// ─── GLOBAL KEY HANDLER ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  if (active === taskInput) return;
  if (active === taskBoxEdit) return;

  switch (e.key) {
    case 'Tab':
      e.preventDefault();
      if (mode === 'ring' || mode === 'normal') {
        // Cycle: ring → input → ring
        if (mode === 'ring') {
          setMode('normal');
          taskInput.focus();
        } else if (tasks.length > 0) {
          if (selectedIdx < 0) selectedIdx = 0;
          setMode('ring');
        }
      }
      break;

    case 'n': case 'N':
      e.preventDefault();
      setMode('normal');
      taskInput.focus();
      break;

    case 'ArrowDown': case 'j':
      e.preventDefault();
      if (tasks.length === 0) break;
      if (mode !== 'ring') { setMode('ring'); if (selectedIdx < 0) selectedIdx = 0; break; }
      selectedIdx = (selectedIdx + 1) % tasks.length;
      break;

    case 'ArrowUp': case 'k':
      e.preventDefault();
      if (tasks.length === 0) break;
      if (mode !== 'ring') { setMode('ring'); if (selectedIdx < 0) selectedIdx = 0; break; }
      selectedIdx = (selectedIdx - 1 + tasks.length) % tasks.length;
      break;

    case ' ':
      e.preventDefault();
      if (mode === 'ring' && selectedIdx >= 0) completeTask(selectedIdx);
      break;

    case 'e': case 'E':
      if (mode === 'ring' && selectedIdx >= 0) startEditTask(selectedIdx);
      break;

    case 'Delete':
      if (mode === 'ring' && selectedIdx >= 0) deleteTask(selectedIdx);
      break;

    case 'Backspace':
      if (active === document.body && mode === 'ring' && selectedIdx >= 0) {
        e.preventDefault(); deleteTask(selectedIdx);
      }
      break;

    case 'Escape':
      if (mode === 'ring') { selectedIdx = -1; setMode('normal'); }
      break;
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (tasks.length > 0) { selectedIdx = 0; }
// Kick off - focus input
taskInput.focus();
</script>
