<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — Task Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #02020f;
    --glass-bg: rgba(8,12,35,0.55);
    --glass-border: rgba(77,201,255,0.18);
    --glass-shine: rgba(255,255,255,0.14);
    --glow-blue: #4dc9ff;
    --glow-purple: #b060ff;
    --glow-teal: #00ffcc;
    --glow-pink: #ff5cf7;
    --text-primary: rgba(255,255,255,0.95);
    --text-dim: rgba(180,210,255,0.5);
    --text-ghost: rgba(120,160,220,0.3);
    --done-color: #00ffcc;
    --sel-bg: rgba(77,201,255,0.07);
    --sel-border: rgba(77,201,255,0.35);
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--void);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; cursor: default; user-select: none;
  }

  /* ══ COSMOS ══ */
  #cosmos {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 25%, rgba(26,5,51,0.9) 0%, transparent 55%),
      radial-gradient(ellipse 60% 80% at 85% 75%, rgba(5,13,46,0.8) 0%, transparent 55%),
      radial-gradient(ellipse 35% 35% at 60% 15%, rgba(10,2,30,0.7) 0%, transparent 60%),
      #02020f;
  }
  #starfield { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .nebula-cloud {
    position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none;
    animation: nebula-drift 22s ease-in-out infinite alternate;
  }
  @keyframes nebula-drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(25px,-18px) scale(1.06); }
  }

  /* ══ SATURN ══ */
  #saturn-scene {
    position: fixed; bottom: -50px; right: -70px;
    width: 540px; height: 430px;
    z-index: 2; pointer-events: none; opacity: 0.78;
    animation: saturn-float 18s ease-in-out infinite;
  }
  @keyframes saturn-float {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-16px) rotate(-2deg); }
  }

  #scanlines {
    position: fixed; inset: 0; z-index: 3;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);
    pointer-events: none;
  }

  /* ══ LAYOUT ══ */
  #app {
    position: relative; z-index: 10; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 24px 20px; gap: 0;
  }

  /* ══ HEADER ══ */
  #header {
    width: 100%; max-width: 720px; margin-bottom: 22px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  #logo {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.1rem);
    letter-spacing: 0.38em; text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 0%, #a8d4ff 30%, #cca8ff 60%, #a8ffea 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: logo-pulse 4s ease-in-out infinite;
  }
  @keyframes logo-pulse {
    0%,100% { filter: drop-shadow(0 0 18px rgba(77,201,255,0.45)); }
    50%      { filter: drop-shadow(0 0 40px rgba(176,96,255,0.65)); }
  }
  #tagline {
    font-family: 'Space Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.42em; color: var(--text-dim); text-transform: uppercase;
  }

  /* ══ SCI-FI PANEL ══ */
  .scifi-panel {
    position: relative;
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid var(--glass-border);
    clip-path: polygon(
      16px 0%, calc(100% - 16px) 0%,
      100% 16px, 100% calc(100% - 16px),
      calc(100% - 16px) 100%, 16px 100%,
      0% calc(100% - 16px), 0% 16px
    );
    box-shadow:
      0 0 0 1px rgba(77,201,255,0.05) inset,
      0 8px 40px rgba(0,0,0,0.55),
      0 0 60px rgba(77,201,255,0.04);
  }
  /* corner bracket decorations */
  .scifi-panel .corner {
    position: absolute; width: 13px; height: 13px;
    border-color: var(--glow-blue); border-style: solid; opacity: 0.65; z-index: 4;
    pointer-events: none;
  }
  .corner.tl { top:4px; left:4px; border-width:1.5px 0 0 1.5px; }
  .corner.tr { top:4px; right:4px; border-width:1.5px 1.5px 0 0; }
  .corner.bl { bottom:4px; left:4px; border-width:0 0 1.5px 1.5px; }
  .corner.br { bottom:4px; right:4px; border-width:0 1.5px 1.5px 0; }
  /* top glow edge */
  .scifi-panel::before {
    content: ''; position: absolute; top:0; left:14%; right:14%; height:1px;
    background: linear-gradient(90deg,transparent,var(--glow-blue) 40%,var(--glow-purple) 60%,transparent);
    opacity: 0.45; z-index: 2; pointer-events: none;
  }
  /* bottom faint edge */
  .scifi-panel::after {
    content: ''; position: absolute; bottom:0; left:14%; right:14%; height:1px;
    background: linear-gradient(90deg,transparent,rgba(77,201,255,0.28) 50%,transparent);
    opacity: 0.4; z-index: 2; pointer-events: none;
  }

  /* ══ INPUT PANEL ══ */
  #input-panel { width:100%; max-width:720px; margin-bottom:13px; padding:17px 22px; }
  #input-row { display:flex; align-items:center; gap:12px; }
  #input-prefix {
    font-family:'Orbitron',monospace; font-size:0.68rem;
    color:var(--glow-purple); letter-spacing:0.08em; opacity:0.85; flex-shrink:0;
  }
  #task-input {
    flex:1; background:transparent; border:none; outline:none;
    font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:500;
    color:var(--text-primary); letter-spacing:0.02em; caret-color:var(--glow-teal);
  }
  #task-input::placeholder { color:var(--text-ghost); font-style:italic; font-weight:300; }
  #input-hint {
    font-family:'Space Mono',monospace; font-size:0.54rem; color:var(--text-ghost);
    white-space:nowrap; padding:3px 10px;
    border:1px solid rgba(77,201,255,0.12); background:rgba(77,201,255,0.04);
    clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
    letter-spacing:0.07em;
  }

  /* ══ TASKS PANEL ══ */
  #tasks-panel {
    width:100%; max-width:720px; flex:1; min-height:0;
    display:flex; flex-direction:column; padding:0; overflow:hidden;
  }
  #tasks-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 22px 11px;
    border-bottom:1px solid rgba(77,201,255,0.08);
    flex-shrink:0; position:relative;
  }
  /* animated scan bar */
  #tasks-header::after {
    content:''; position:absolute; bottom:-1px; left:0;
    height:1px; width:35%;
    background:linear-gradient(90deg,transparent,var(--glow-teal),transparent);
    animation:scan-line 4s ease-in-out infinite;
  }
  @keyframes scan-line { 0%{left:-40%} 100%{left:140%} }
  #tasks-label {
    font-family:'Orbitron',monospace; font-size:0.6rem;
    letter-spacing:0.3em; color:var(--text-dim); text-transform:uppercase;
  }
  #task-count {
    font-family:'Space Mono',monospace; font-size:0.62rem;
    color:var(--glow-teal); letter-spacing:0.1em;
  }

  /* ══ SCROLL + HIGHLIGHT ══ */
  #tasks-scroll {
    flex:1; overflow-y:auto; overflow-x:hidden; padding:8px 12px;
    position:relative;
    scrollbar-width:thin; scrollbar-color:rgba(77,201,255,0.15) transparent;
  }
  #tasks-scroll::-webkit-scrollbar { width:3px; }
  #tasks-scroll::-webkit-scrollbar-thumb { background:rgba(77,201,255,0.2); border-radius:2px; }

  /* Gliding selection bar */
  #sel-highlight {
    position:absolute; left:12px; right:12px;
    background:var(--sel-bg);
    border:1px solid var(--sel-border);
    clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
    box-shadow:0 0 18px rgba(77,201,255,0.07) inset, 0 0 1px rgba(77,201,255,0.55);
    transition: top 0.17s cubic-bezier(0.23,1,0.32,1), height 0.1s ease, opacity 0.15s ease;
    opacity:0; pointer-events:none; z-index:0;
  }
  /* left-edge caret glow */
  #sel-highlight::before {
    content:''; position:absolute; left:0; top:22%; bottom:22%;
    width:2px;
    background:var(--glow-blue);
    box-shadow:0 0 8px var(--glow-blue), 0 0 18px var(--glow-blue);
    border-radius:1px;
    animation:caret-blink 1.1s step-end infinite;
  }
  @keyframes caret-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ══ EMPTY STATE ══ */
  #empty-state {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:12px; padding:44px 0; color:var(--text-ghost);
  }
  #empty-icon { font-size:2.3rem; animation:float 4s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  #empty-state p {
    font-family:'Space Mono',monospace; font-size:0.64rem;
    letter-spacing:0.15em; text-align:center; line-height:2.2;
  }

  /* ══ TASK ITEM ══ */
  .task-item {
    display:flex; align-items:center; gap:13px;
    padding:12px 12px; margin-bottom:5px;
    cursor:pointer; position:relative; z-index:1;
    border:1px solid transparent;
    transition:opacity 0.2s ease;
  }
  @keyframes task-enter {
    from { opacity:0; transform:translateX(-10px); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes task-exit {
    from { opacity:1; transform:translateX(0); max-height:60px; margin-bottom:5px; }
    to   { opacity:0; transform:translateX(60px); max-height:0; margin-bottom:0; padding:0; }
  }

  .task-item.done .task-text {
    text-decoration:line-through; color:var(--text-dim);
    text-decoration-color:var(--done-color); text-decoration-thickness:1px;
  }
  .task-item.done .task-check {
    background:rgba(0,255,204,0.12) !important;
    border-color:var(--done-color) !important;
    box-shadow:0 0 10px rgba(0,255,204,0.35),0 0 0 2px rgba(0,255,204,0.08);
  }
  .task-item.done .task-check::after { opacity:1 !important; transform:scale(1) rotate(0deg) !important; }

  .task-check {
    width:20px; height:20px;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%); /* hexagon */
    border:1.5px solid rgba(120,160,220,0.3); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.3s cubic-bezier(0.23,1,0.32,1);
  }
  .task-check::after {
    content:'✓'; font-size:0.6rem; color:var(--done-color);
    opacity:0; transform:scale(0.5) rotate(-20deg);
    transition:all 0.3s cubic-bezier(0.23,1,0.32,1);
  }
  .task-num {
    font-family:'Space Mono',monospace; font-size:0.53rem;
    color:var(--text-ghost); min-width:18px; text-align:right; letter-spacing:0.05em;
  }
  .task-text {
    flex:1; font-size:1rem; font-weight:500;
    color:var(--text-primary); letter-spacing:0.01em; line-height:1.3;
    transition:color 0.3s ease; word-break:break-word;
  }
  .task-edit-input {
    flex:1; background:transparent; border:none;
    border-bottom:1px solid var(--glow-blue); outline:none;
    font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:500;
    color:var(--text-primary); caret-color:var(--glow-blue); padding-bottom:2px;
  }
  .task-priority { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
  .p-high { background:#ff5cf7; box-shadow:0 0 5px #ff5cf7; }
  .p-med  { background:#4dc9ff; box-shadow:0 0 5px #4dc9ff; }
  .p-low  { background:#b060ff; box-shadow:0 0 5px #b060ff; }

  /* ══ SHORTCUTS ══ */
  #shortcuts-panel {
    width:100%; max-width:720px; margin-top:11px; padding:11px 20px;
    display:flex; flex-wrap:wrap; gap:5px 18px; justify-content:center;
  }
  .shortcut { display:flex; align-items:center; gap:6px; font-size:0.65rem; color:var(--text-dim); font-family:'Space Mono',monospace; }
  .key {
    background:rgba(77,201,255,0.06); border:1px solid rgba(77,201,255,0.2);
    border-bottom:2px solid rgba(77,201,255,0.1); padding:2px 6px;
    font-size:0.52rem; color:rgba(180,220,255,0.8); letter-spacing:0.05em;
    font-family:'Orbitron',monospace; white-space:nowrap;
    clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  }

  /* ══ PARTICLES ══ */
  .particle {
    position:fixed; border-radius:50%; pointer-events:none; z-index:200;
    animation:particle-burst 0.75s cubic-bezier(0.23,1,0.32,1) forwards;
  }
  @keyframes particle-burst {
    0%   { opacity:1; transform:translate(0,0) scale(1); }
    100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
  }
  .orbit-ring {
    position:fixed; border-radius:50%; pointer-events:none; z-index:200;
    opacity:0; animation:orbit-expand 0.55s ease-out forwards;
  }
  @keyframes orbit-expand {
    0%   { opacity:0.7; transform:translate(-50%,-50%) scale(0.2); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(3.5); }
  }
  .warp-line {
    position:fixed; width:1px; height:38vh; top:28%;
    background:linear-gradient(to bottom,transparent,var(--glow-purple),transparent);
    pointer-events:none; z-index:99; transform-origin:center;
    animation:warp-line 0.38s ease-out forwards;
  }
  @keyframes warp-line {
    0%   { opacity:0.8; transform:scaleY(0.1); }
    50%  { opacity:0.5; transform:scaleY(1); }
    100% { opacity:0; transform:scaleY(0.1); }
  }

  /* ══ MODE INDICATOR ══ */
  #mode-indicator {
    position:fixed; top:18px; right:22px;
    font-family:'Orbitron',monospace; font-size:0.52rem;
    letter-spacing:0.2em; padding:5px 14px;
    background:rgba(8,12,35,0.65); border:1px solid rgba(77,201,255,0.15);
    color:var(--text-dim); z-index:50;
    clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
    transition:all 0.3s ease;
  }
  #mode-indicator.editing { color:var(--glow-blue); border-color:rgba(77,201,255,0.45); box-shadow:0 0 14px rgba(77,201,255,0.2); }
  #mode-indicator.adding  { color:var(--glow-purple); border-color:rgba(176,96,255,0.45); box-shadow:0 0 14px rgba(176,96,255,0.2); }

  /* ══ TOAST ══ */
  #toast {
    position:fixed; bottom:26px; left:50%;
    transform:translateX(-50%) translateY(16px);
    padding:9px 22px;
    background:rgba(8,12,35,0.8); border:1px solid rgba(77,201,255,0.22);
    backdrop-filter:blur(20px);
    font-family:'Space Mono',monospace; font-size:0.6rem;
    letter-spacing:0.1em; color:var(--text-dim);
    opacity:0; transition:all 0.28s cubic-bezier(0.23,1,0.32,1);
    z-index:300; pointer-events:none; white-space:nowrap;
    clip-path:polygon(12px 0%,calc(100% - 12px) 0%,100% 50%,calc(100% - 12px) 100%,12px 100%,0% 50%);
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="cosmos"></div>
<canvas id="starfield"></canvas>
<div id="scanlines"></div>

<!-- ══ SATURN + MOON SVG ══ -->
<svg id="saturn-scene" viewBox="0 0 540 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sGrad" cx="40%" cy="36%" r="58%">
      <stop offset="0%"   stop-color="#f8e49a"/>
      <stop offset="22%"  stop-color="#e8b84b"/>
      <stop offset="50%"  stop-color="#c98a1a"/>
      <stop offset="75%"  stop-color="#9a5e0e"/>
      <stop offset="100%" stop-color="#5c3005"/>
    </radialGradient>
    <radialGradient id="sAtmo" cx="50%" cy="50%" r="50%">
      <stop offset="72%"  stop-color="rgba(220,155,50,0)"/>
      <stop offset="100%" stop-color="rgba(220,140,40,0.22)"/>
    </radialGradient>
    <!-- ring gradients — horizontal spread -->
    <linearGradient id="rOuter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(215,165,80,0)"/>
      <stop offset="7%"   stop-color="rgba(215,165,80,0.52)"/>
      <stop offset="28%"  stop-color="rgba(245,195,115,0.75)"/>
      <stop offset="50%"  stop-color="rgba(175,130,60,0.42)"/>
      <stop offset="72%"  stop-color="rgba(245,195,115,0.75)"/>
      <stop offset="93%"  stop-color="rgba(215,165,80,0.52)"/>
      <stop offset="100%" stop-color="rgba(215,165,80,0)"/>
    </linearGradient>
    <linearGradient id="rMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(255,220,140,0)"/>
      <stop offset="12%"  stop-color="rgba(255,220,140,0.32)"/>
      <stop offset="50%"  stop-color="rgba(200,160,85,0.22)"/>
      <stop offset="88%"  stop-color="rgba(255,220,140,0.32)"/>
      <stop offset="100%" stop-color="rgba(255,220,140,0)"/>
    </linearGradient>
    <linearGradient id="rShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(25,8,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(25,8,0,0)"/>
    </linearGradient>
    <!-- Moon -->
    <radialGradient id="mGrad" cx="37%" cy="34%" r="57%">
      <stop offset="0%"   stop-color="#d8e2f0"/>
      <stop offset="45%"  stop-color="#8898c0"/>
      <stop offset="100%" stop-color="#3a4d72"/>
    </radialGradient>
    <radialGradient id="mAtmo" cx="50%" cy="50%" r="50%">
      <stop offset="68%"  stop-color="rgba(100,145,230,0)"/>
      <stop offset="100%" stop-color="rgba(100,145,230,0.25)"/>
    </radialGradient>
    <linearGradient id="mrGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(155,190,235,0)"/>
      <stop offset="14%"  stop-color="rgba(155,190,235,0.62)"/>
      <stop offset="50%"  stop-color="rgba(115,155,205,0.35)"/>
      <stop offset="86%"  stop-color="rgba(155,190,235,0.62)"/>
      <stop offset="100%" stop-color="rgba(155,190,235,0)"/>
    </linearGradient>

    <!-- clip: left half (behind) vs right half (front), split at planet center x=268 -->
    <clipPath id="cBehind"><rect x="0"   y="0" width="268" height="430"/></clipPath>
    <clipPath id="cFront"> <rect x="268" y="0" width="272" height="430"/></clipPath>
    <!-- clip moon ring behind/front split at moon center x=105 -->
    <clipPath id="mBehind"><rect x="0"   y="0" width="105" height="430"/></clipPath>
    <clipPath id="mFront"> <rect x="105" y="0" width="435" height="430"/></clipPath>
  </defs>

  <!-- Saturn atmosphere glow -->
  <circle cx="268" cy="252" r="112" fill="url(#sAtmo)"/>

  <!-- ── RINGS BEHIND planet (left side) ── -->
  <g clip-path="url(#cBehind)">
    <ellipse cx="268" cy="265" rx="200" ry="33" fill="none" stroke="url(#rOuter)" stroke-width="30" opacity="0.72"/>
    <ellipse cx="268" cy="265" rx="152" ry="25" fill="none" stroke="url(#rMid)"   stroke-width="14" opacity="0.58"/>
    <ellipse cx="268" cy="265" rx="122" ry="20" fill="none" stroke="rgba(255,208,115,0.2)" stroke-width="7"/>
  </g>

  <!-- ── SATURN BODY ── -->
  <circle cx="268" cy="252" r="100" fill="url(#sGrad)"/>

  <!-- Atmosphere bands -->
  <ellipse cx="268" cy="224" rx="100" ry="14" fill="rgba(155,85,12,0.26)"/>
  <ellipse cx="268" cy="250" rx="100" ry="10" fill="rgba(95,50,6,0.20)"/>
  <ellipse cx="268" cy="272" rx="100" ry="8"  fill="rgba(155,85,12,0.18)"/>
  <ellipse cx="268" cy="292" rx="94"  ry="6"  fill="rgba(95,50,6,0.16)"/>

  <!-- Ring shadow on planet surface -->
  <ellipse cx="268" cy="262" rx="100" ry="22" fill="url(#rShadow)" opacity="0.48"/>

  <!-- Specular highlight -->
  <ellipse cx="238" cy="224" rx="40" ry="26" fill="rgba(255,242,200,0.16)" transform="rotate(-18,238,224)"/>

  <!-- ── RINGS FRONT (right side, over planet) ── -->
  <g clip-path="url(#cFront)">
    <ellipse cx="268" cy="265" rx="200" ry="33" fill="none" stroke="url(#rOuter)" stroke-width="30" opacity="0.84"/>
    <ellipse cx="268" cy="265" rx="152" ry="25" fill="none" stroke="url(#rMid)"   stroke-width="14" opacity="0.68"/>

<div id="mode-indicator">ORBIT CONTROL</div>
<div id="toast"></div>

<div id="app">
  <div id="header">
    <div id="logo">ORBIT</div>
    <div id="tagline">// Personal Task Control — Alpha Station</div>
  </div>

  <!-- Input -->
  <div class="scifi-panel" id="input-panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="input-row">
      <div id="input-prefix">CMD://</div>
      <input id="task-input" type="text" placeholder="New mission directive…" autocomplete="off" spellcheck="false">
      <div id="input-hint">ENTER ↵</div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="scifi-panel" id="tasks-panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="tasks-header">
      <div id="tasks-label">Active Missions</div>
      <div id="task-count">0 / 0</div>
    </div>
    <div id="tasks-scroll">
      <div id="sel-highlight"></div>
      <div id="empty-state">
        <div id="empty-icon">🛸</div>
        <p>No missions logged.<br>TYPE above &amp; press ENTER to launch</p>
      </div>
      <div id="task-list"></div>
    </div>
  </div>

  <!-- Shortcuts -->
  <div class="scifi-panel" id="shortcuts-panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="shortcut"><span class="key">↑↓</span> Navigate</div>
    <div class="shortcut"><span class="key">SPC</span> Complete</div>
    <div class="shortcut"><span class="key">E</span> Edit</div>
    <div class="shortcut"><span class="key">DEL</span> Delete</div>
    <div class="shortcut"><span class="key">N</span> New</div>
    <div class="shortcut"><span class="key">ESC</span> Clear sel</div>
  </div>
</div>

<script>
// ══ STARFIELD ══
(function(){
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const stars = Array.from({length:240}, ()=>({
    x:Math.random(), y:Math.random(),
    r:Math.random()*1.3+0.15, op:Math.random()*0.6+0.1,
    spd:Math.random()*0.008+0.003, ph:Math.random()*Math.PI*2
  }));
  const shoots=[];
  function maybeShoot(){
    if(Math.random()<0.35) shoots.push({
      x:Math.random()*innerWidth, y:Math.random()*innerHeight*0.55,
      vx:(Math.random()*4+2)*(Math.random()<0.5?1:-1), vy:Math.random()*1.5+0.8, op:0.85
    });
    setTimeout(maybeShoot, Math.random()*4500+1800);
  }
  maybeShoot();
  let t=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height); t+=0.016;
    stars.forEach(s=>{
      const o=s.op*(0.5+0.5*Math.sin(t*s.spd*60+s.ph));
      ctx.beginPath(); ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${o})`; ctx.fill();
    });
    shoots.forEach((s,i)=>{
      s.x+=s.vx; s.y+=s.vy; s.op-=0.022;
      if(s.op<=0){shoots.splice(i,1);return;}
      const g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*10,s.y-s.vy*10);
      g.addColorStop(0,`rgba(200,218,255,${s.op})`); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*10,s.y-s.vy*10);
      ctx.strokeStyle=g; ctx.lineWidth=1.2; ctx.stroke();
    });
    requestAnimationFrame(draw);
  })();
})();

// ══ NEBULA ══
[
  {c:'rgba(70,0,160,0.16)',s:550,t:'8%', l:'3%', d:'0s'},
  {c:'rgba(0,50,160,0.13)',s:420,t:'55%',l:'68%',d:'6s'},
  {c:'rgba(120,0,160,0.1)',s:600,t:'35%',l:'38%',d:'11s'},
  {c:'rgba(0,100,160,0.09)',s:320,t:'75%',l:'18%',d:'3s'},
].forEach(({c,s,t,l,d})=>{
  const el=document.createElement('div'); el.className='nebula-cloud';
  el.style.cssText=`background:radial-gradient(circle,${c},transparent 70%);width:${s}px;height:${s}px;top:${t};left:${l};animation-delay:${d}`;
  document.getElementById('cosmos').appendChild(el);
});

// ══ STATE ══
let tasks = JSON.parse(localStorage.getItem('orbit-tasks')||'[]');
let selectedIdx = tasks.length>0 ? 0 : -1;
let mode='normal';
const COLORS=['p-high','p-med','p-low'];
function save(){ localStorage.setItem('orbit-tasks',JSON.stringify(tasks)); }

// ══ TOAST ══
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// ══ EFFECTS ══
function burst(x,y,color,count=10){
  for(let i=0;i<count;i++){
    const p=document.createElement('div'); p.className='particle';
    const angle=Math.PI*2*i/count+Math.random()*0.5;
    const dist=28+Math.random()*48, sz=2+Math.random()*4;
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${color};box-shadow:0 0 ${sz*2}px ${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p); p.addEventListener('animationend',()=>p.remove());
  }
  const ring=document.createElement('div'); ring.className='orbit-ring';
  ring.style.cssText=`left:${x}px;top:${y}px;width:28px;height:28px;border:1.5px solid ${color};`;
  document.body.appendChild(ring); ring.addEventListener('animationend',()=>ring.remove());
}
function warpEffect(){
  for(let i=0;i<7;i++){
    const line=document.createElement('div'); line.className='warp-line';
    line.style.cssText=`left:${10+Math.random()*80}vw;animation-delay:${Math.random()*0.18}s;`;
    document.body.appendChild(line); line.addEventListener('animationend',()=>line.remove());
  }
}

// ══ SELECTION HIGHLIGHT — smooth glide, no redraw ══
function moveHighlight(){
  const hl=document.getElementById('sel-highlight');
  const list=document.getElementById('task-list');
  if(selectedIdx<0||tasks.length===0||!list.children[selectedIdx]){
    hl.style.opacity='0'; return;
  }
  const item=list.children[selectedIdx];
  // offsetTop relative to task-list, plus task-list's own offsetTop within tasks-scroll
  const top = item.offsetTop + list.offsetTop;
  hl.style.top = top+'px';
  hl.style.height = item.offsetHeight+'px';
  hl.style.opacity = '1';
  // smooth scroll into view
  item.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ══ RENDER ══
function render(fullRedraw=true){
  const list=document.getElementById('task-list');
  const empty=document.getElementById('empty-state');
  const count=document.getElementById('task-count');
  const done=tasks.filter(t=>t.done).length;
  count.textContent=`${done} / ${tasks.length} done`;
  empty.style.display=tasks.length===0?'flex':'none';

  if(!fullRedraw){
    // just sync classes & count, highlight already positioned
    Array.from(list.children).forEach((el,i)=>{
      if(!tasks[i]) return;
      el.classList.toggle('done',!!tasks[i].done);
    });
    return;
  }

  list.innerHTML='';
  tasks.forEach((task,i)=>{
    const el=document.createElement('div');
    el.className=`task-item${task.done?' done':''}`;
    el.dataset.idx=i;

    const check=document.createElement('div'); check.className='task-check';
    const num=document.createElement('div'); num.className='task-num'; num.textContent=String(i+1).padStart(2,'0');
    const dot=document.createElement('div'); dot.className=`task-priority ${COLORS[i%3]}`;

    if(task.editing){
      const inp=document.createElement('input');
      inp.className='task-edit-input'; inp.value=task.text; inp.type='text';
      el.append(check,num,dot,inp); list.appendChild(el);
      requestAnimationFrame(()=>{ inp.focus(); inp.selectionStart=inp.value.length; });
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter'){e.stopPropagation();commitEdit(task,inp.value);}
        else if(e.key==='Escape'){e.stopPropagation();cancelEdit(task);}
      });
      inp.addEventListener('blur',()=>{ if(task.editing) commitEdit(task,inp.value); });
    } else {
      const txt=document.createElement('div'); txt.className='task-text'; txt.textContent=task.text;
      el.append(check,num,dot,txt);
    }

    el.addEventListener('click',()=>{
      if(mode==='adding') return;
      if(selectedIdx===i){ completeTask(i); }
      else { selectedIdx=i; moveHighlight(); }
    });

    el.style.animation='task-enter 0.3s cubic-bezier(0.23,1,0.32,1) forwards';
    list.appendChild(el);
  });

  // position highlight after DOM settles
  requestAnimationFrame(()=>requestAnimationFrame(moveHighlight));
}

function commitEdit(task,val){
  task.text=val.trim()||task.text; task.editing=false; mode='normal'; setMode('normal');
  save(); render(); showToast('Mission updated ✎');
}
function cancelEdit(task){
  task.editing=false; mode='normal'; setMode('normal'); render();
}
function setMode(m){
  mode=m;
  const ind=document.getElementById('mode-indicator');
  ind.className=m!=='normal'?m:'';
  ind.textContent={normal:'ORBIT CONTROL',adding:'ADDING MISSION',editing:'EDITING MISSION'}[m]||'ORBIT CONTROL';
}

// ══ ACTIONS ══
function completeTask(idx){
  if(idx<0||idx>=tasks.length) return;
  tasks[idx].done=!tasks[idx].done;
  const el=document.querySelector(`[data-idx="${idx}"]`);
  if(el){
    const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    if(tasks[idx].done){ burst(cx,cy,'#00ffcc',12); showToast('Mission complete 🛸'); }
    else { burst(cx,cy,'#b060ff',8); showToast('Mission reopened ○'); }
  }
  save(); render(false);
  requestAnimationFrame(moveHighlight);
}

function deleteTask(idx){
  if(idx<0||idx>=tasks.length) return;
  const el=document.querySelector(`[data-idx="${idx}"]`);
  if(el){
    const r=el.getBoundingClientRect();
    burst(r.left+r.width/2,r.top+r.height/2,'#ff4d6d',8);
    el.style.animation='task-exit 0.28s cubic-bezier(0.23,1,0.32,1) forwards';
    setTimeout(()=>{
      tasks.splice(idx,1);
      if(selectedIdx>=tasks.length) selectedIdx=tasks.length-1;
      save(); render();
    },260);
  } else {
    tasks.splice(idx,1);
    if(selectedIdx>=tasks.length) selectedIdx=tasks.length-1;
    save(); render();
  }
  showToast('Mission scrubbed ✕');
}

function editTask(idx){
  if(idx<0||idx>=tasks.length) return;
  tasks[idx].editing=true; setMode('editing'); render();
}
function addTask(text){
  if(!text.trim()) return;
  tasks.push({text:text.trim(),done:false,id:Date.now()});
  selectedIdx=tasks.length-1;
  warpEffect(); burst(innerWidth/2,110,'#b060ff',14);
  showToast('Mission logged 🚀');
  save(); render();
}

// ══ INPUT ══
const taskInput=document.getElementById('task-input');
taskInput.addEventListener('focus',()=>setMode('adding'));
taskInput.addEventListener('blur',()=>{ if(mode==='adding') setMode('normal'); });
taskInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ const v=taskInput.value.trim(); if(v){ addTask(v); taskInput.value=''; taskInput.blur(); setMode('normal'); } }
  else if(e.key==='Escape'){ taskInput.value=''; taskInput.blur(); setMode('normal'); }
});

// ══ KEYBOARD ══
document.addEventListener('keydown',e=>{
  const active=document.activeElement;
  if(active===taskInput||active.classList.contains('task-edit-input')) return;
  if(mode==='editing') return;
  switch(e.key){
    case 'ArrowDown': case 'j':
      e.preventDefault();
      if(!tasks.length) break;
      selectedIdx=selectedIdx<0?0:Math.min(tasks.length-1,selectedIdx+1);
      moveHighlight(); // ← just glide the bar, zero DOM change
      break;
    case 'ArrowUp': case 'k':
      e.preventDefault();
      if(!tasks.length) break;
      selectedIdx=selectedIdx<0?0:Math.max(0,selectedIdx-1);
      moveHighlight();
      break;
    case ' ':
      e.preventDefault();
      if(selectedIdx>=0) completeTask(selectedIdx);
      break;
    case 'e': case 'E':
      if(selectedIdx>=0&&!tasks[selectedIdx]?.done) editTask(selectedIdx);
      break;
    case 'Delete':
      if(selectedIdx>=0) deleteTask(selectedIdx);
      break;
    case 'Backspace':
      if(active===document.body){ e.preventDefault(); if(selectedIdx>=0) deleteTask(selectedIdx); }
      break;
    case 'n': case 'N':
      e.preventDefault(); taskInput.focus(); break;
    case 'Escape':
      selectedIdx=-1; moveHighlight(); break;
  }
});

// ══ INIT ══
render();
</script>
</body>
