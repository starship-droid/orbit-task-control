
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT — Task Control</title>
<meta name="description" content="ORBIT: Personal Task Control. A sleek sci-fi task management app with keyboard shortcuts and real-time visual feedback.">
<meta property="og:title" content="ORBIT — Task Control">
<meta property="og:description" content="Personal Task Control — Alpha Station. Manage your missions with sci-fi style.">
<meta property="og:image" content="https://orbit-control.netlify.app/orbit-preview-100.png">
<meta property="og:type" content="website">
<meta name="twitter:image" content="https://orbit-control.netlify.app/orbit-preview-100.png">
<link rel="icon" type="image/svg+xml" href="orbit-control.svg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #02020f;
    --deep: #060616;
    --nebula-1: #1a0533;
    --nebula-2: #050d2e;
    --glass-bg: rgba(8,12,35,0.55);
    --glass-border: rgba(77,201,255,0.18);
    --glass-shine: rgba(255,255,255,0.14);
    --glow-blue: #4dc9ff;
    --glow-purple: #b060ff;
    --glow-teal: #00ffcc;
    --glow-pink: #ff5cf7;
    --star-white: rgba(255,255,255,0.85);
    --text-primary: rgba(255,255,255,0.95);
    --text-dim: rgba(180,210,255,0.5);
    --text-ghost: rgba(120,160,220,0.3);
    --done-color: #00ffcc;
    --delete-color: #ff4d6d;
    --sel-bg: rgba(77,201,255,0.07);
    --sel-border: rgba(77,201,255,0.35);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--void);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    cursor: default;
    user-select: none;
  }

  /* ── COSMIC BACKGROUND ── */
  #cosmos {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 30%, #1a0533 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, #050d2e 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, #0a0a20 0%, transparent 70%),
                var(--void);
  }

  #starfield {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
    50% { opacity: var(--max-op, 0.9); transform: scale(var(--scale, 1.3)); }
  }

  /* Nebula clouds */
  .nebula-cloud {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    animation: nebula-drift 20s ease-in-out infinite alternate;
  }

  @keyframes nebula-drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -20px) scale(1.05); }
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    gap: 0;
  }

  /* ── HEADER ── */
  #header {
    width: 100%;
    max-width: 720px;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 0%, #b0d4ff 35%, #d4b0ff 65%, #b0ffe8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(77,201,255,0.5));
    animation: logo-pulse 4s ease-in-out infinite;
  }

  @keyframes logo-pulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(77,201,255,0.4)); }
    50% { filter: drop-shadow(0 0 45px rgba(176,96,255,0.6)); }
  }

  #tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── SCI-FI PANEL ── */
  .glass-panel {
    position: relative;
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid var(--glass-border);
    clip-path: polygon(
      16px 0%, calc(100% - 16px) 0%,
      100% 16px, 100% calc(100% - 16px),
      calc(100% - 16px) 100%, 16px 100%,
      0% calc(100% - 16px), 0% 16px
    );
    box-shadow:
      0 0 0 1px rgba(77,201,255,0.05) inset,
      0 8px 40px rgba(0,0,0,0.55),
      0 0 60px rgba(77,201,255,0.04);
    overflow: hidden;
  }

  /* Corner bracket decorations */
  .glass-panel .corner {
    position: absolute; width: 13px; height: 13px;
    border-color: var(--glow-blue); border-style: solid; opacity: 0.65; z-index: 4;
    pointer-events: none;
  }
  .corner.tl { top:4px; left:4px; border-width:1.5px 0 0 1.5px; }
  .corner.tr { top:4px; right:4px; border-width:1.5px 1.5px 0 0; }
  .corner.bl { bottom:4px; left:4px; border-width:0 0 1.5px 1.5px; }
  .corner.br { bottom:4px; right:4px; border-width:0 1.5px 1.5px 0; }

  /* Top glow edge */
  .glass-panel::before {
    content: ''; position: absolute; top:0; left:14%; right:14%; height:1px;
    background: linear-gradient(90deg,transparent,var(--glow-blue) 40%,var(--glow-purple) 60%,transparent);
    opacity: 0.45; z-index: 2; pointer-events: none;
  }

  /* Bottom faint edge */
  .glass-panel::after {
    content: ''; position: absolute; bottom:0; left:14%; right:14%; height:1px;
    background: linear-gradient(90deg,transparent,rgba(77,201,255,0.28) 50%,transparent);
    opacity: 0.4; z-index: 2; pointer-events: none;
  }

  /* ── INPUT PANEL ── */
  #input-panel {
    width: 100%;
    max-width: 720px;
    margin-bottom: 16px;
    padding: 18px 22px;
  }

  #input-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #task-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    caret-color: var(--glow-teal);
  }

  #task-input::placeholder {
    color: var(--text-ghost);
    font-style: italic;
    font-weight: 300;
  }

  #input-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.54rem;
    color: var(--text-ghost);
    white-space: nowrap;
    padding: 3px 10px;
    border: 1px solid rgba(77,201,255,0.12);
    background: rgba(77,201,255,0.04);
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    letter-spacing: 0.07em;
  }

  /* ── TASKS PANEL ── */
  #tasks-panel {
    width: 100%;
    max-width: 720px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }

  #tasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  #tasks-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  #task-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--glow-teal);
    letter-spacing: 0.1em;
  }

  /* ── GLIDING SELECTION BAR ── */
  #sel-highlight {
    position:absolute; left:12px; right:12px;
    background:var(--sel-bg);
    border:1px solid var(--sel-border);
    clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
    box-shadow:0 0 18px rgba(77,201,255,0.07) inset, 0 0 1px rgba(77,201,255,0.55);
    transition: top 0.17s cubic-bezier(0.23,1,0.32,1), height 0.1s ease, opacity 0.15s ease;
    opacity:0; pointer-events:none; z-index:0;
  }

  /* Left-edge caret glow */
  #sel-highlight::before {
    content:''; position:absolute; left:0; top:22%; bottom:22%;
    width:2px;
    background:var(--glow-blue);
    box-shadow:0 0 8px var(--glow-blue), 0 0 18px var(--glow-blue);
    border-radius:1px;
    animation:caret-blink 1.1s step-end infinite;
  }

  @keyframes caret-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #tasks-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 12px;
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: rgba(77,201,255,0.15) transparent;
  }

  #tasks-scroll::-webkit-scrollbar { width: 3px; }
  #tasks-scroll::-webkit-scrollbar-track { background: transparent; }
  #tasks-scroll::-webkit-scrollbar-thumb { background: rgba(77,201,255,0.2); border-radius: 2px; }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 48px 0;
    color: var(--text-ghost);
  }

  #empty-icon {
    font-size: 2.5rem;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  #empty-state p {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 2;
  }

  /* ── TASK ITEM ── */
  .task-item {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 12px 12px;
    margin-bottom: 5px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    border: 1px solid transparent;
    transition: opacity 0.2s ease;
    animation: task-enter 0.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }

  @keyframes task-enter {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes task-exit {
    from { opacity: 1; transform: translateX(0) scaleX(1); max-height: 60px; margin-bottom: 5px; }
    to { opacity: 0; transform: translateX(60px) scaleX(0.8); max-height: 0; margin-bottom: 0; padding: 0; }
  }

  @keyframes task-complete-flash {
    0% { background: rgba(0,255,204,0); }
    40% { background: rgba(0,255,204,0.15); box-shadow: 0 0 30px rgba(0,255,204,0.3) inset; }
    100% { background: rgba(0,255,204,0); }
  }

  @keyframes task-delete-flash {
    0% { background: rgba(255,77,109,0); }
    40% { background: rgba(255,77,109,0.15); box-shadow: 0 0 30px rgba(255,77,109,0.3) inset; }
    100% { background: rgba(255,77,109,0); }
  }



  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--text-dim);
    text-decoration-color: var(--done-color);
    text-decoration-thickness: 1px;
  }

  .task-item.done .task-check {
    background: rgba(0,255,204,0.15);
    border-color: var(--done-color);
    box-shadow: 0 0 12px rgba(0,255,204,0.4), 0 0 0 2px rgba(0,255,204,0.1);
  }

  .task-item.done .task-check::after {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  /* Checkmark */
  .task-check {
    width: 20px; height: 20px;
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    border: 1.5px solid rgba(120,160,220,0.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
  }

  .task-check::after {
    content: '✓';
    font-size: 0.7rem;
    color: var(--done-color);
    opacity: 0;
    transform: scale(0.5) rotate(-20deg);
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .task-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-ghost);
    min-width: 18px;
    text-align: right;
    letter-spacing: 0.05em;
  }

  .task-text {
    flex: 1;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.01em;
    line-height: 1.3;
    transition: color 0.3s ease, text-decoration 0.3s ease;
    word-break: break-word;
  }

  /* Edit input inside task */
  .task-edit-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--glow-blue);
    outline: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--glow-blue);
    padding-bottom: 2px;
  }

  .task-priority {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── KEYBOARD SHORTCUTS PANEL ── */
  #shortcuts-panel {
    width: 100%;
    max-width: 720px;
    margin-top: 14px;
    padding: 14px 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 24px;
    justify-content: center;
  }

  .shortcut {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  .key {
    background: rgba(77,201,255,0.06);
    border: 1px solid rgba(77,201,255,0.2);
    border-bottom: 2px solid rgba(77,201,255,0.1);
    padding: 2px 6px;
    font-size: 0.52rem;
    color: rgba(180,220,255,0.8);
    letter-spacing: 0.05em;
    font-family: 'Orbitron', monospace;
    white-space: nowrap;
    clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    animation: particle-burst 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }

  @keyframes particle-burst {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ── ORBIT RING ANIMATION ON COMPLETE ── */
  .orbit-ring {
    position: fixed;
    border-radius: 50%;
    border: 1.5px solid var(--glow-teal);
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    animation: orbit-expand 0.6s ease-out forwards;
  }

  @keyframes orbit-expand {
    0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.2); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(3); }
  }

  /* ── MODE INDICATOR ── */
  #mode-indicator {
    position: fixed;
    top: 20px; right: 24px;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    padding: 6px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    z-index: 50;
    transition: all 0.3s ease;
  }

  #mode-indicator.editing {
    color: var(--glow-blue);
    border-color: rgba(77,201,255,0.4);
    background: rgba(77,201,255,0.06);
    box-shadow: 0 0 15px rgba(77,201,255,0.2);
  }

  #mode-indicator.adding {
    color: var(--glow-purple);
    border-color: rgba(176,96,255,0.4);
    background: rgba(176,96,255,0.06);
    box-shadow: 0 0 15px rgba(176,96,255,0.2);
  }



  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 30px;
    backdrop-filter: blur(20px);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scanline effect */
  #scanlines {
    position: fixed; inset: 0; z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  /* Priority dot colors */
  .p-high { background: #ff5cf7; box-shadow: 0 0 6px #ff5cf7; }
  .p-med { background: #4dc9ff; box-shadow: 0 0 6px #4dc9ff; }
  .p-low { background: #b060ff; box-shadow: 0 0 6px #b060ff; }

  /* Warp speed animation when adding */
  @keyframes warp-line {
    0% { transform: scaleY(0) translateX(var(--x)); opacity: 0.8; }
    50% { transform: scaleY(1) translateX(var(--x)); opacity: 0.5; }
    100% { transform: scaleY(0) translateX(var(--x)); opacity: 0; }
  }

  .warp-line {
    position: fixed;
    width: 1px;
    height: 40vh;
    top: 50%;
    background: linear-gradient(to bottom, transparent, var(--glow-purple), transparent);
    pointer-events: none;
    z-index: 99;
    transform-origin: center;
    animation: warp-line 0.4s ease-out forwards;
  }


</style>
</head>
<body>

<div id="cosmos"></div>
<canvas id="starfield"></canvas>
<div id="scanlines"></div>

<div id="mode-indicator">ORBIT CONTROL</div>
<div id="toast"></div>

<div id="app">

  <div id="header">
    <div id="logo">ORBIT</div>
    <div id="tagline">// Personal Task Control — Alpha Station</div>
  </div>

  <!-- Input -->
  <div class="glass-panel" id="input-panel">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="input-row">
      <span style="color:var(--glow-purple);font-size:1rem;opacity:0.7;flex-shrink:0">+</span>
      <input id="task-input" type="text" placeholder="New mission directive…" autocomplete="off" spellcheck="false">
      <div id="input-hint">ENTER to launch</div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="glass-panel" id="tasks-panel">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="tasks-header">
      <div id="tasks-label">Active Missions</div>
      <div id="task-count">0 / 0</div>
    </div>
    <div id="tasks-scroll">
      <div id="sel-highlight"></div>
      <div id="empty-state">
        <div id="empty-icon">🛸</div>
        <p>No missions logged.<br>TYPE a task above and press ENTER</p>
      </div>
      <div id="task-list"></div>
    </div>
  </div>

  <!-- Shortcuts -->
  <div class="glass-panel" id="shortcuts-panel">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="shortcut"><span class="key">↑ ↓</span> Navigate</div>
    <div class="shortcut"><span class="key">Space</span> Complete</div>
    <div class="shortcut"><span class="key">E</span> Edit</div>
    <div class="shortcut"><span class="key">Del</span> Delete</div>
    <div class="shortcut"><span class="key">N</span> New task</div>
    <div class="shortcut"><span class="key">Esc</span> Cancel</div>
  </div>

</div>

<script>
// ── STARS ──
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length: 220}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.4 + 0.2,
    op: Math.random() * 0.7 + 0.1,
    speed: Math.random() * 0.012 + 0.004,
    phase: Math.random() * Math.PI * 2
  }));

  // Shooting stars
  const shoots = [];
  function maybeShoot() {
    if (Math.random() < 0.3) {
      shoots.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.5,
        vx: (Math.random() * 4 + 3) * (Math.random() < 0.5 ? 1 : -1),
        vy: Math.random() * 2 + 1,
        len: Math.random() * 80 + 40,
        op: 0.9,
        life: 0
      });
    }
    setTimeout(maybeShoot, Math.random() * 4000 + 2000);
  }
  maybeShoot();

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.016;

    stars.forEach(s => {
      const op = s.op * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${op})`;
      ctx.fill();
    });

    shoots.forEach((s, i) => {
      s.life += 0.05;
      s.x += s.vx;
      s.y += s.vy;
      s.op -= 0.025;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
      const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
      grad.addColorStop(0, `rgba(180,210,255,${s.op})`);
      grad.addColorStop(1, 'transparent');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if (s.op <= 0) shoots.splice(i, 1);
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ── NEBULA CLOUDS ──
(function() {
  const clouds = [
    { color: 'rgba(80,0,180,0.18)', size: 500, top: '10%', left: '5%', delay: '0s' },
    { color: 'rgba(0,60,180,0.14)', size: 400, top: '60%', left: '70%', delay: '5s' },
    { color: 'rgba(140,0,180,0.1)', size: 600, top: '40%', left: '40%', delay: '10s' },
    { color: 'rgba(0,120,180,0.08)', size: 300, top: '80%', left: '20%', delay: '3s' },
  ];
  clouds.forEach(c => {
    const el = document.createElement('div');
    el.className = 'nebula-cloud';
    el.style.cssText = `
      background: radial-gradient(circle, ${c.color}, transparent 70%);
      width: ${c.size}px; height: ${c.size}px;
      top: ${c.top}; left: ${c.left};
      animation-delay: ${c.delay};
    `;
    document.getElementById('cosmos').appendChild(el);
  });
})();

// ── APP STATE ──
let tasks = JSON.parse(localStorage.getItem('orbit-tasks') || '[]');
let selectedIdx = -1;
let mode = 'normal'; // normal | adding | editing
const COLORS = ['p-high', 'p-med', 'p-low'];

function save() {
  localStorage.setItem('orbit-tasks', JSON.stringify(tasks));
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── PARTICLES ──
function burst(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const dist = 30 + Math.random() * 50;
    const size = 2 + Math.random() * 4;
    p.style.cssText = `
      left: ${x}px; top: ${y}px;
      width: ${size}px; height: ${size}px;
      background: ${color};
      box-shadow: 0 0 ${size * 2}px ${color};
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
  // orbit ring
  const ring = document.createElement('div');
  ring.className = 'orbit-ring';
  ring.style.cssText = `left: ${x}px; top: ${y}px; width: 30px; height: 30px; border-color: ${color};`;
  document.body.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());
}

function warpEffect() {
  for (let i = 0; i < 8; i++) {
    const line = document.createElement('div');
    line.className = 'warp-line';
    const xPos = 10 + Math.random() * 80;
    line.style.cssText = `left: ${xPos}vw; --x: ${(Math.random()-0.5)*20}px; animation-delay: ${Math.random()*0.2}s;`;
    document.body.appendChild(line);
    line.addEventListener('animationend', () => line.remove());
  }
}

function deleteEffect(x, y) {
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 8;
    const dist = 20 + Math.random() * 40;
    p.style.cssText = `
      left: ${x}px; top: ${y}px;
      width: 3px; height: 3px;
      background: #ff4d6d;
      box-shadow: 0 0 8px #ff4d6d;
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ── SELECTION HIGHLIGHT — smooth glide ──
function moveHighlight(){
  const hl=document.getElementById('sel-highlight');
  const list=document.getElementById('task-list');
  if(selectedIdx<0||tasks.length===0||!list.children[selectedIdx]){
    hl.style.opacity='0'; return;
  }
  const item=list.children[selectedIdx];
  const top = item.offsetTop;
  hl.style.top = top+'px';
  hl.style.height = item.offsetHeight+'px';
  hl.style.opacity = '1';
  item.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── RENDER ──
function render() {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('task-count');
  const done = tasks.filter(t => t.done).length;
  count.textContent = `${done} / ${tasks.length} done`;

  empty.style.display = tasks.length === 0 ? 'flex' : 'none';
  list.innerHTML = '';

  tasks.forEach((task, i) => {
    const el = document.createElement('div');
    el.className = `task-item${task.done ? ' done' : ''}${selectedIdx === i ? ' selected' : ''}`;
    el.dataset.idx = i;

    const check = document.createElement('div');
    check.className = 'task-check';

    const num = document.createElement('div');
    num.className = 'task-num';
    num.textContent = String(i + 1).padStart(2, '0');

    const dot = document.createElement('div');
    dot.className = `task-priority ${COLORS[i % 3]}`;

    if (task.editing) {
      const input = document.createElement('input');
      input.className = 'task-edit-input';
      input.value = task.text;
      input.type = 'text';
      el.appendChild(check);
      el.appendChild(num);
      el.appendChild(dot);
      el.appendChild(input);
      list.appendChild(el);

      requestAnimationFrame(() => {
        input.focus();
        input.selectionStart = input.value.length;
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.stopPropagation();
          task.text = input.value.trim() || task.text;
          task.editing = false;
          mode = 'normal';
          setMode('normal');
          save(); render();
          showToast('Mission updated ✎');
        } else if (e.key === 'Escape') {
          e.stopPropagation();
          task.editing = false;
          mode = 'normal';
          setMode('normal');
          render();
        }
      });
      input.addEventListener('blur', () => {
        if (task.editing) {
          task.text = input.value.trim() || task.text;
          task.editing = false;
          mode = 'normal';
          setMode('normal');
          save(); render();
        }
      });
    } else {
      const text = document.createElement('div');
      text.className = 'task-text';
      text.textContent = task.text;
      el.appendChild(check);
      el.appendChild(num);
      el.appendChild(dot);
      el.appendChild(text);
    }

    el.addEventListener('click', (e) => {
      if (mode === 'adding') return;
      if (selectedIdx === i) {
        completeTask(i);
      } else {
        selectedIdx = i;
        moveHighlight();
      }
    });

    list.appendChild(el);
  });

  // Position highlight after DOM settles
  requestAnimationFrame(()=>requestAnimationFrame(moveHighlight));
}

function setMode(m) {
  mode = m;
  const ind = document.getElementById('mode-indicator');
  ind.className = m !== 'normal' ? m : '';
  const labels = { normal: 'ORBIT CONTROL', adding: 'ADDING MISSION', editing: 'EDITING MISSION' };
  ind.textContent = labels[m] || 'ORBIT CONTROL';
}

// ── ACTIONS ──
function completeTask(idx) {
  if (idx < 0 || idx >= tasks.length) return;
  tasks[idx].done = !tasks[idx].done;

  // Get position for effect
  const el = document.querySelector(`[data-idx="${idx}"]`);
  if (el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (tasks[idx].done) {
      burst(cx, cy, '#00ffcc', 12);
      el.style.animation = 'task-complete-flash 0.5s ease forwards';
      showToast('Mission complete 🛸');
    } else {
      burst(cx, cy, '#b060ff', 8);
      showToast('Mission reopened ○');
    }
  }
  save(); render();
  requestAnimationFrame(moveHighlight);
}

function deleteTask(idx) {
  if (idx < 0 || idx >= tasks.length) return;
  const el = document.querySelector(`[data-idx="${idx}"]`);
  if (el) {
    const rect = el.getBoundingClientRect();
    deleteEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);
    el.style.animation = 'task-exit 0.3s cubic-bezier(0.23, 1, 0.32, 1) forwards';
    setTimeout(() => {
      tasks.splice(idx, 1);
      if (selectedIdx >= tasks.length) selectedIdx = tasks.length - 1;
      save(); render();
    }, 280);
  } else {
    tasks.splice(idx, 1);
    if (selectedIdx >= tasks.length) selectedIdx = tasks.length - 1;
    save(); render();
  }
  showToast('Mission scrubbed ✕');
}

function editTask(idx) {
  if (idx < 0 || idx >= tasks.length) return;
  tasks[idx].editing = true;
  setMode('editing');
  render();
}

function addTask(text) {
  if (!text.trim()) return;
  tasks.push({ text: text.trim(), done: false, id: Date.now() });
  selectedIdx = tasks.length - 1;
  warpEffect();
  burst(window.innerWidth / 2, 120, '#b060ff', 14);
  showToast('Mission logged 🚀');
  save(); render();
}

// ── INPUT ──
const taskInput = document.getElementById('task-input');

taskInput.addEventListener('focus', () => setMode('adding'));
taskInput.addEventListener('blur', () => {
  if (mode === 'adding') setMode('normal');
});

taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = taskInput.value.trim();
    if (val) {
      addTask(val);
      taskInput.value = '';
      taskInput.blur();
      setMode('normal');
    }
  } else if (e.key === 'Escape') {
    taskInput.value = '';
    taskInput.blur();
    setMode('normal');
  }
});

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  // Don't intercept when input or edit is focused
  const active = document.activeElement;
  if (active === taskInput || active.classList.contains('task-edit-input')) return;
  if (mode === 'editing') return;

  switch(e.key) {
    case 'ArrowDown':
    case 'j':
      e.preventDefault();
      if(!tasks.length) break;
      selectedIdx=selectedIdx<0?0:Math.min(tasks.length-1,selectedIdx+1);
      moveHighlight();
      break;

    case 'ArrowUp':
    case 'k':
      e.preventDefault();
      if(!tasks.length) break;
      selectedIdx=selectedIdx<0?0:Math.max(0,selectedIdx-1);
      moveHighlight();
      break;

    case ' ':
      e.preventDefault();
      if (selectedIdx >= 0) completeTask(selectedIdx);
      break;

    case 'e':
    case 'E':
      if (selectedIdx >= 0 && !tasks[selectedIdx].done) editTask(selectedIdx);
      break;

    case 'Delete':
    case 'Backspace':
      if (e.key === 'Backspace' && active === document.body) {
        e.preventDefault();
        if (selectedIdx >= 0) deleteTask(selectedIdx);
      } else if (e.key === 'Delete') {
        if (selectedIdx >= 0) deleteTask(selectedIdx);
      }
      break;

    case 'n':
    case 'N':
      e.preventDefault();
      taskInput.focus();
      break;

    case 'Escape':
      selectedIdx = -1;
      render();
      break;
  }
});

// ── INIT ──
render();

// Auto-select first if tasks exist
if (tasks.length > 0) selectedIdx = 0;
render();
</script>
